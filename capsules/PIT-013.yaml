id: PIT-013
trigger_time: "2026-03-02 21:10"
category: env
severity: high

problem:
  signal: "curl 下载 alicdn.com 图片返回 1x1 GIF（49 bytes）而非真实图片"
  description: |
    从服务器用 curl 下载淘宝/天猫商品图片（img.alicdn.com 域名），
    无论是否加 Referer/User-Agent header，都返回一个 49 bytes 的
    1x1 GIF 占位图。ScraperAPI 代理和 weserv.nl 图片代理同样被拦截。
    但 Python urllib 带完整浏览器 headers 可以成功下载。
  env_fingerprint:
    platform: linux (Tencent Cloud server)
    cdn_domain: img.alicdn.com, gw.alicdn.com
    server_ip: 43.160.242.46

error_process:
  - step: "curl -sL 直接下载"
    result: "49 bytes, GIF image data, version 89a, 1 x 1"
  - step: "curl -sL -H 'Referer: https://www.taobao.com' 下载"
    result: "同上，49 bytes 1x1 GIF"
  - step: "curl -sL -H 'User-Agent: Mozilla/5.0...' -H 'Referer: ...' 下载"
    result: "同上，49 bytes 1x1 GIF"
  - step: "ScraperAPI 代理下载 (api.scraperapi.com/?url=...)"
    result: "同上，49 bytes 1x1 GIF"
  - step: "ScraperAPI render 模式 (render=true)"
    result: "同上，49 bytes 1x1 GIF"
  - step: "weserv.nl 图片代理"
    result: "返回 JSON: Domain or TLD blocked by policy"

correct_process:
  - step: "使用 Python urllib 带完整浏览器 Accept header"
    detail: |
      关键是 Accept header 必须包含 image/* 格式：
      Accept: image/webp,image/apng,image/*,*/*;q=0.8

      curl 默认发送 Accept: */* 被 CDN 拒绝。
      即使手动加 -H 'Accept: image/webp,...' 也可能因为 curl 的其他
      默认 header 差异被拦截。

      用 Python urllib.request.Request 可以精确控制所有 header：
      ```python
      headers = {
          "User-Agent": "Mozilla/5.0 ... Chrome/131",
          "Referer": "https://www.taobao.com/",
          "Accept": "image/webp,image/apng,image/*,*/*;q=0.8",
          "Accept-Language": "zh-CN,zh;q=0.9",
      }
      req = urllib.request.Request(url, headers=headers)
      resp = urllib.request.urlopen(req)
      ```
  - step: "使用 download_images.py 工具脚本"
    detail: |
      创建了 scripts/download_images.py 封装 urllib 下载逻辑，
      支持从文件读取 URL 列表（避免 bash !! 历史扩展问题）。
      uv run scripts/download_images.py -o /tmp/images -f urls.txt

root_cause: |
  阿里 CDN (img.alicdn.com) 的防盗链策略不是基于 IP，而是基于 HTTP Accept header。
  curl 默认的 Accept: */* 被识别为非浏览器请求，返回 1x1 GIF 占位图。
  Python urllib 可以精确设置 Accept: image/webp,image/apng,image/*,*/*;q=0.8，
  模拟真实浏览器的图片请求，从而成功下载。

  这与 PIT-008 的结论（"服务器 IP 被封"）不同——实际上不是 IP 封禁，而是 header 检测。
  服务器 IP 本身可以下载图片，只要 HTTP headers 正确模拟浏览器行为。
confidence: 0.95
blast_radius:
  files:
    - skills/store-teardown/scripts/download_images.py
  scope: "所有需要从 alicdn.com 下载图片的场景"
related:
  - PIT-008  # 更正了 PIT-008 关于 IP 封禁的结论
