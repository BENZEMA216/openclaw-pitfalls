id: PIT-018
trigger_time: "2026-03-11 15:00"
category: data-format
severity: medium

problem:
  signal: "Session trace endpoint returns empty arrays despite agent having run tool calls"
  description: |
    When building the OpenClaw Debugger session trace feature, tool call extraction
    returned zero results. The code was looking for content type "tool_use" with
    an "input" field, but OpenClaw's JSONL session format uses different field names.
  env_fingerprint:
    platform: linux (OpenCloudOS, 6.1.0)
    openclaw: "2026.3.2"
    file: /root/.openclaw/agents/main/sessions/*.jsonl

error_process:
  - step: "Built /api/session/{id}/trace endpoint scanning for tool_use + input"
    result: "Empty results on all sessions including 3MB session with 602 tool calls"
  - step: "Checked raw JSONL content types"
    result: "Content types: {text, thinking, toolCall, image} — no tool_use at all"

correct_process:
  - step: "Use type 'toolCall' (not 'tool_use') to identify tool invocations"
  - step: "Access arguments via 'arguments' field (not 'input')"
  - step: "Images sent inline by user/agent use type 'image' with base64 'data' field"

root_cause: |
  OpenClaw stores conversation history in its own native JSONL format which differs
  from Anthropic's API message format:
  - Anthropic API: type="tool_use", field="input"
  - OpenClaw JSONL: type="toolCall", field="arguments"
  - Inline images: type="image", field="data" (base64), field="mimeType"
  The "tool_result" type does NOT appear in OpenClaw sessions (tool responses are
  embedded differently). Line-level record types: session, model_change,
  thinking_level_change, custom, message.

notes: |
  Full OpenClaw JSONL message content type inventory (confirmed from bb331759 session,
  1277 messages, 602 tool calls, 14 inline images):
  - "text": plain text
  - "thinking": extended thinking, field="thinking"
  - "toolCall": tool invocation, fields="name","arguments","id","partialJson"
  - "image": inline base64 image, fields="data","mimeType"
